<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <title>Cabix Katalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>Cabix Katalog</h1>
        <p>Sifatli mebel yechimlari</p>
    </header>

    <main id="app" class="container">
        <!-- Kategoriyalar shu yerga yuklanadi -->
    </main>

    <!-- To'liq ekranli rasm ko'rish (Lightbox) -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="" alt="To'liq ko'rinish">
        <div class="lightbox-nav">
            <button class="nav-btn prev" onclick="changeImage(-1, event)">&#10094;</button>
            <button class="nav-btn next" onclick="changeImage(1, event)">&#10095;</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
