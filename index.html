<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e3a8a">
    <title>Cabix Mebel - Oshxona Modullari Katalogi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <h1>Cabix Mebel</h1>
            <p class="tagline">Premium Oshxona Modullari</p>
        </div>
    </header>

    <main class="catalog-container">
        <!-- Bosh sahifa - Kategoriyalar -->
        <div id="home-view" class="view active">
            <div class="intro-section">
                <h2>Katalogimiz</h2>
                <p>Sifat va nafislikning mukammal uyg'unligi</p>
            </div>
            <div class="category-grid" id="category-grid"></div>
        </div>

        <!-- Kitob ko'rinishidagi prezentatsiya -->
        <div id="book-view" class="view">
            <div class="book-controls">
                <button class="control-btn" onclick="goHome()">
                    <span>←</span> Bosh sahifa
                </button>
                <div class="page-indicator">
                    <span id="current-page">1</span> / <span id="total-pages">11</span>
                </div>
                <div class="zoom-controls">
                    <button class="control-btn" onclick="zoomIn()">🔍+</button>
                    <button class="control-btn" onclick="zoomOut()">🔍-</button>
                    <button class="control-btn" onclick="resetZoom()">↺</button>
                </div>
            </div>

            <div class="book-wrapper">
                <div class="book" id="book">
                    <!-- Sahifalar JavaScript orqali yaratiladi -->
                </div>
            </div>

            <div class="book-navigation">
                <button class="nav-arrow prev" onclick="prevPage()">
                    <span>❮</span>
                </button>
                <button class="nav-arrow next" onclick="nextPage()">
                    <span>❯</span>
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
